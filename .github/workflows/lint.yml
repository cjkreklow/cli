name: Lint
on: [pull_request]

env:
  GO111MODULE: on

jobs:
  lint:
    runs-on: ubuntu-latest
    name: GolangCI-Lint
    steps:
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
